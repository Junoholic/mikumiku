<title>miku</title>
<style>
body {
    background-color: #181818;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
}
.nav {
    text-align: center;
    margin: 15px;
    font-family: monospace;
    color: #ffffff;
}
.nav a {
    color: #7df9ff;
    text-decoration: none;
}
.nav a:visited,
.nav a:active,
.nav a:hover {
    color: #7df9ff;
}
.nav span {
    color: #ffffff;
}
h1 {
    color: #ffffff;
    margin-bottom: 24px;
}
.card {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 40px;
}
.card img {
    max-width: 250px;
    height: auto;
    border-radius: 10px;
}
#info {
    color: #7df9ff;
    font-family: monospace;
    white-space: pre;
    font-size: 13px;
    line-height: 1.6;
}
</style>
</head>
<body>
<div class="nav">
  <a href="/">home</a> <span>•</span>
  <a href="/chat.html">chat</a>
</div>
<h1>hello welcoem to my website</h1>
<div class="card">
  <img src="hatsune-miku-anime.gif" alt="miku">
  <div id="info"></div>
</div>
<script>
const infoEl = document.getElementById("info");

function render(ip="unknown") {
  const ua = navigator.userAgent;
  const os =
      ua.includes("Win") ? "Windows" :
      ua.includes("Mac") ? "macOS" :
      ua.includes("Linux") ? "Linux" : "Unknown";
  const browser =
      ua.includes("Firefox") ? "Firefox" :
      ua.includes("Chrome") ? "Chrome" :
      ua.includes("Safari") ? "Safari" : "Unknown";

  infoEl.textContent =
`$ neofetch

user:    juno
os:      ${os}
browser: ${browser}
screen:  ${window.screen.width}x${window.screen.height}
ip:      ${ip}
status:  online`;
}

fetch("https://api.ipify.org?format=json")
  .then(r => r.json())
  .then(d => render(d.ip))
  .catch(() => render("unknown"));
</script>
</body>
</html>
