function intToXboxName(n) {
  // force to 32-bit unsigned
  n = BigInt.asUintN(32, n);

  let x = Number(n);

  const number = x % 1000;
  x = Math.floor(x / 1000);

  const noun =
    NOUNS[x % NOUNS.length];
  x = Math.floor(x / NOUNS.length);

  const adjective =
    ADJECTIVES[x % ADJECTIVES.length];

  return (
    adjective +
    noun +
    number.toString().padStart(3, "0")
  );
}

function strhash(str) {
    let hash = 2166136261n; // FNV offset basis
    for (let i = 0; i < str.length; i++) {
        hash ^= BigInt(str.charCodeAt(i)); // XOR with the byte
        hash *= 16777619n; // FNV prime
    }
    return hash;
}

async function genUsername() {
  try {
    const response = await fetch('https://api.ipify.org?format=json');
    const data = await response.json();

    let hash = strhash(data.ip);

    const name = intToXboxName(hash);

    console.log(name);

    return name; 
  } 
  catch (err) {
    console.log("ip failure");
    return "ErrorMan69"; // or return a fallback name if you want
  }
}

const firebaseConfig = {

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ordered mesages fix
const messages = query(
  collection(db, "messages"),
  orderBy("time", "asc")
);

async function init() {
  // user id
  const userId = await genUsername();
  console.log("Here")
  console.log(userId);

  //hopw the fuck did i forget enter to send
  document.getElementById("msg").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      send();
    }
  });

    
  // message sending script
  window.send = async function () {
    const input = document.getElementById("msg");

    if (!input.value.trim()) return;

    await addDoc(collection(db, "messages"), {
      text: input.value,
      id: userId,
      time: serverTimestamp()
    });

    input.value = "";
  };


  onSnapshot(messages, (snap) => {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    snap.forEach(doc => {
      const m = doc.data();

      if (!m.time) return;

      const div = document.createElement("div");
      div.className = "msg";
      div.textContent = `[${m.id}] ${m.text}`;

      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  });
}
init();
