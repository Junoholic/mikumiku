<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>mikumiku chat</title>

<style>
body {
  margin: 0;
  background: #0b0f14;
  color: #7df9ff;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#miku-bg {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px; 
  opacity: 0.08; 
  z-index: -1;
  pointer-events: none;
}

  
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  border-bottom: 1px solid #7df9ff;
}

.msg {
  margin: 4px 0;
}

#bar {
  display: flex;
  padding: 10px;
  gap: 10px;
}

input {
  flex: 1;
  background: #111;
  border: 1px solid #7df9ff;
  color: #7df9ff;
  padding: 8px;
  font-family: monospace;
}

button {
  background: #1a1f2a;
  border: 1px solid #7df9ff;
  color: #7df9ff;
  padding: 8px 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<img id="miku-bg" src="hachunemiku.png" />
  
<div id="chat"></div>

<div id="bar">
  <input id="msg" placeholder="type message..." />
  <button onclick="send()">send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  serverTimestamp,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";



const firebaseConfig = {
  apiKey: "AIzaSyCxGa827PeavMRmIC0IQQVW_36nCQ5N8Xg",
  authDomain: "mikumiku-chat.firebaseapp.com",
  projectId: "mikumiku-chat"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ordered mesages fix
const messages = query(
  collection(db, "messages"),
  orderBy("time")
);

// user id
const userId = Math.random().toString(36).slice(2, 8);

//hopw the fuck did i forget enter to send
document.getElementById("msg").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    send();
  }
});

  
// message sending script
window.send = async function () {
  const input = document.getElementById("msg");

  if (!input.value.trim()) return;

  await addDoc(collection(db, "messages"), {
    text: input.value,
    id: userId,
    time: serverTimestamp()
  });

  input.value = "";
};


onSnapshot(messages, (snap) => {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  snap.forEach(doc => {
    const m = doc.data();

    const div = document.createElement("div");
    div.className = "msg";
    div.textContent = `[${m.id}] ${m.text}`;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
